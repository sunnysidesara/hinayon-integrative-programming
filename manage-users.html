<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Users | Mars Colonization Initiative</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="manage-users.css" />
  </head>
  <body>
    <!-- Main Container -->
    <div class="manage-container">
      <!-- Header with Back Button and Add User -->
      <div class="manage-header">
        <div class="header-left">
          <a href="admin.html" class="back-btn">← Back to Dashboard</a>
          <h1>Manage Users</h1>
        </div>
        <button class="add-btn" onclick="showForm()">+ Add User</button>
      </div>

      <!-- Add User Form (Hidden by default) -->
      <div id="userForm" class="form-container" style="display: none">
        <h3>Add New User</h3>
        <div class="form-group">
          <input type="text" id="userName" placeholder="Full Name" />
          <input type="email" id="userEmail" placeholder="Email Address" />
          <input type="password" id="userPassword" placeholder="Password" />
          <select id="userRole">
            <option value="Scientist">Scientist</option>
            <option value="Engineer">Engineer</option>
            <option value="Medical">Medical Officer</option>
            <option value="Pilot">Pilot</option>
          </select>
          <div class="form-actions">
            <button class="save-btn" onclick="addUser()">Save</button>
            <button class="cancel-btn" onclick="hideForm()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Users Table -->
      <div class="table-wrapper">
        <table class="user-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <!-- Table rows will be populated by JavaScript -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- Footer -->
    <footer class="admin-footer">
      <p>© 2026 Mars Colonization Initiative | Hinayon, Sarah Mae</p>
    </footer>

    <!-- Link to main script.js -->
    <script src="script.js"></script>
  </body>
</html>
