<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mars Initiative – Saved Planets</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dashboard-page">
    <!-- Background Video with Overlay (same as api.html) -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/apiback.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="bg-overlay"></div>

    <!-- Navigation -->
    <nav class="dashboard-nav">
      <div class="dashboard-nav-container">
        <a href="api.html" class="dashboard-nav-logo">MARS INITIATIVE</a>
        <ul class="dashboard-nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="api.html">What's Beyond Mars</a></li>
          <li><a href="#" class="active">View History</a></li>
        </ul>
      </div>
    </nav>

    <!-- Background Effects (dust & scan lines – optional, can keep) -->
    <div class="dashboard-bg-effect">
      <div class="dashboard-dust"></div>
      <div class="dashboard-scan"></div>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="saveditems-header">
        <h1>GOING BEYOND MARS</h1>
      </div>

      <div class="api-container">
        <!-- Saved Items Grid -->
        <div id="saved-items-container" class="saved-grid">
          <!-- Items will be loaded here via JavaScript -->
        </div>

        <!-- Action Buttons -->
        <div class="saved-actions">
          <!-- FIX 1: Call clearAllSavedPlanets() instead of clearAllSaved() -->
          <button onclick="clearAllSavedPlanets()" class="clear-btn">
            🗑️ CLEAR ALL
          </button>
          <button onclick="window.location.href = 'api.html'" class="back-btn">
            ← SEARCH MORE
          </button>
        </div>

        <!-- Stats Section -->
        <div id="saved-stats" class="saved-stats"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="dashboard-footer">
      <div class="footer-container-simple">
        <p class="footer-text">
          © 2026 Mars Colonization Initiative | Data from Ninjas API
        </p>
      </div>
    </footer>

    <script src="script.js"></script>
    <script>
      function adjustSavedGrid() {
        const grid = document.querySelector(".saved-grid");
        if (!grid) return;
        const cards = grid.querySelectorAll(".saved-card");
        if (cards.length === 1) {
          grid.style.justifyContent = "center";
        } else {
          grid.style.justifyContent = "flex-start";
        }
      }

      // Run when page loads and after any changes (e.g., clear all)
      document.addEventListener("DOMContentLoaded", adjustSavedGrid);
      window.addEventListener("storage", adjustSavedGrid); // in case another tab modifies
    </script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        if (typeof displaySavedPlanets === "function") {
          displaySavedPlanets();
        } else {
          console.error(
            "displaySavedPlanets function not found. Make sure script.js is loaded correctly.",
          );
        }
      });
    </script>
  </body>
</html>
