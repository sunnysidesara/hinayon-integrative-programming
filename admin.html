<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mars Initiative - Space Agency Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Simple Admin Dashboard -->
    <div class="admin-container">
      <!-- Sidebar -->
      <div class="admin-sidebar">
        <div class="admin-profile">
          <div class="admin-avatar">👨‍🚀</div>
          <h3>Admin User</h3>
          <p>Mission Commander</p>
        </div>

        <div class="admin-menu">
          <a href="admin.html" class="active">📊 Dashboard</a>
          <a href="manage-users.html">👥 Users</a>
          <!-- This now links to manage-users.html -->
          <a href="#">🚀 Missions</a>
          <a href="#">⚡ Resources</a>
          <a href="#">🔒 Security</a>
        </div>
        <!-- Example in admin.html -->
        <div class="admin-status">
          <p><a href="index.html" class="status-link">🔴 Home</a></p>
          <p>
            <a href="login.html" class="status-link logout-link">⏻ Log Out</a>
          </p>
        </div>
      </div>
    </nav>

    <div class="dashboard-bg-effect">
      <div class="dashboard-dust"></div>
      <div class="dashboard-scan"></div>
    </div>

    <main class="dashboard-main">
      <div class="api-header">
        <h1>🌍 SPACE AGENCY FINDER</h1>
        <p>Search any country to check for space programs</p>
      </div>

      <div class="api-container">
        <div class="search-box">
          <input
            type="text"
            id="countryInput"
            placeholder="Enter country (e.g., USA, Japan)"
          />
          <button onclick="searchCountry()">SEARCH</button>
        </div>

        <div id="result"></div>
        <div id="marsFact" class="mars-fact"></div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
