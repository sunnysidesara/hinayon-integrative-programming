<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What's Beyond Mars</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dashboard-page">
    <!-- Navigation -->
    <nav class="dashboard-nav">
      <div class="dashboard-nav-container">
        <a href="api.html" class="dashboard-nav-logo">MARS INITIATIVE</a>
        <ul class="dashboard-nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="api.html" class="active">What's Beyond Mars</a></li>
          <li><a href="saved-items.html">View History</a></li>
        </ul>
      </div>
    </nav>

    <!-- Background Video with Overlay -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/apiback.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="bg-overlay"></div>

    <!-- Background Effects -->
    <div class="dashboard-bg-effect">
      <div class="dashboard-dust"></div>
      <div class="dashboard-scan"></div>
    </div>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="api-header">
        <h1>WHAT'S BEYOND MARS</h1>
      </div>

      <div class="api-container">
        <div class="search-wrapper">
          <div class="search-box">
            <input
              type="text"
              id="planetInput"
              placeholder="e.g., Mars, Jupiter, Saturn..."
            />
            <button onclick="searchPlanet()" class="search-button">
              🔍 SEARCH
            </button>
          </div>
        </div>

        <div id="result"></div>
      </div>
    </main>

    <footer class="api-footer">
      <p>© 2026 Mars Colonization Initiative | Data from Ninjas API</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
